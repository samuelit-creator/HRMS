{% extends "myapp/base.html" %}
{% block content %}

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --bg: #f4f7fb;
    --card-bg: #ffffff;
    --text-dark: #1f2937;
    --text-muted: #6b7280;
    --border: #e5e7eb;
}

/* Page Background */
body {
    background-color: var(--bg);
}

/* Wrapper */
.hr-form-wrapper {
    max-width: 1050px;
    margin: 50px auto;
    font-family: "Inter", "Segoe UI", sans-serif;
}

/* Card */
.hr-form-card {
    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    overflow: hidden;
}

/* Header */
.hr-form-header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #ffffff;
    padding: 28px 32px;
}

.hr-form-header h2 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
}

/* Sections */
.section {
    padding: 30px 32px;
    border-bottom: 1px solid var(--border);
}

.section:last-child {
    border-bottom: none;
}

.section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.section-title::before {
    content: "";
    width: 6px;
    height: 18px;
    background: var(--primary);
    border-radius: 3px;
}

/* Grid */
.hr-form-body {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px 26px;
}

/* Form Groups */
.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
}

/* Inputs */
.form-group input,
.form-group select {
    padding: 11px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 14px;
    background: #fff;
    transition: all 0.25s ease;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

.form-group input[readonly] {
    background-color: #f1f5f9;
    color: #64748b;
}

/* Bank Section */
.bank-section {
    background-color: #f9fafb;
}

/* Actions */
.form-actions {
    padding: 22px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 14px;
    background: #fafafa;
}

/* Buttons */
.btn {
    padding: 11px 26px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: all 0.25s ease;
}

.btn-save {
    background: var(--primary);
    color: #ffffff;
}

.btn-save:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
}

.btn-cancel {
    background: #e5e7eb;
    color: #374151;
}

.btn-cancel:hover {
    background: #d1d5db;
}

/* Mobile */
@media (max-width: 768px) {
    .hr-form-body {
        grid-template-columns: 1fr;
    }

    .form-actions {
        flex-direction: column-reverse;
    }

    .btn {
        width: 100%;
        text-align: center;
    }
}
</style>

<div class="hr-form-wrapper">
    <div class="hr-form-card">

        <!-- Header -->
        <div class="hr-form-header">
            <h2>Edit Employee Profile</h2>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Employee Information -->
            <div class="section">
                <div class="section-title">Employee Information</div>

                <div class="hr-form-body">
                    <div class="form-group">
                        <label>Employee Code</label>
                        <input type="text" name="emp_code" value="{{ profile.emp_code }}" readonly>
                    </div>

                    <div class="form-group">
                        <label>Employee Name</label>
                        <input type="text" name="name" value="{{ profile.name }}">
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Profile Photo</label>
                        {% if profile.photo %}
                        <div style="margin-bottom: 10px;">
                            <img src="data:image/jpeg;base64,{{ profile.photo }}" alt="Current Photo" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border);">
                        </div>
                        {% endif %}
                        <input type="file" name="profile_photo" accept="image/*" style="background: transparent; border: 1px dashed var(--primary); padding: 10px; width: 100%;">
                    </div>

                    <div class="form-group">
                        <label>Employment Type</label>
                        <select name="employment_type">
                            <option value="Permanent" {% if profile.employment_type == "Permanent" %}selected{% endif %}>Permanent</option>
                            <option value="Trainee" {% if profile.employment_type == "Trainee" %}selected{% endif %}>Trainee</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Designation</label>
                        <input type="text" name="designation" value="{{ profile.designation }}">
                    </div>

                    <div class="form-group">
                        <label>Qualification</label>
                        <input type="text" name="qualification" value="{{ profile.qualification }}">
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" name="location" value="{{ profile.location }}">
                    </div>

                    <div class="form-group">
                        <label>Department</label>
                        <select name="department_id">
                            {% for dept in departments %}
                            <option value="{{ dept.0 }}" {% if dept.0 == profile.department_id %}selected{% endif %}>
                                {{ dept.1 }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date of Joining</label>
                        <input type="date" name="doj" value="{{ profile.doj|date:'Y-m-d' }}">
                    </div>

                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" value="{{ profile.dob|date:'Y-m-d' }}">
                    </div>

                    <div class="form-group">
                        <label>Marital Status</label>
                        <select name="marital_status">
                            <option value="Single" {% if profile.marital_status == "Single" %}selected{% endif %}>Single</option>
                            <option value="Married" {% if profile.marital_status == "Married" %}selected{% endif %}>Married</option>
                            <option value="Divorced" {% if profile.marital_status == "Divorced" %}selected{% endif %}>Divorced</option>
                            <option value="Widowed" {% if profile.marital_status == "Widowed" %}selected{% endif %}>Widowed</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ profile.email }}">
                    </div>

                    <div class="form-group">
                        <label>Team</label>
                        <input type="text" name="team" value="{{ profile.team }}">
                    </div>

                    <div class="form-group">
                        <label>Total Experience</label>
                        <input type="text" name="total_experience" value="{{ profile.total_experience }}">
                    </div>

                    <div class="form-group">
                        <label>Previous Organization</label>
                        <input type="text" name="prev_org" value="{{ profile.prev_org }}">
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <input type="text" name="gender" value="{{ profile.gender }}">
                    </div>

                    <div class="form-group">
                        <label>Father Name</label>
                        <input type="text" name="father_name" value="{{ profile.father_name }}">
                    </div>

                    <div class="form-group">
                        <label>Mother Name</label>
                        <input type="text" name="mother_name" value="{{ profile.mother_name }}">
                    </div>

                    <div class="form-group">
                        <label>Residential Address</label>
                        <input type="text" name="residential_address" value="{{ profile.residential_address }}">
                    </div>

                    <div class="form-group">
                        <label>Permanent Address</label>
                        <input type="text" name="permanent_address" value="{{ profile.permanent_address }}">
                    </div>

                    <div class="form-group">
                        <label>Contact No</label>
                        <input type="number" name="contact_no" value="{{ profile.contact_no }}">
                    </div>

                    <div class="form-group">
                        <label>Place of Birth</label>
                        <input type="text" name="place_of_birth" value="{{ profile.place_of_birth }}">
                    </div>

                    <div class="form-group">
                        <label>Blood Group</label>
                        <input type="text" name="blood_group" value="{{ profile.blood_group }}">
                    </div>

                    <div class="form-group">
                        <label>Emergency Contact</label>
                        <input type="text" name="emergency_contact" value="{{ profile.emergency_contact }}">
                    </div>

                    <div class="form-group">
                        <label>Aadhaar Number</label>
                        <input type="text" name="aadhaar_number" value="{{ profile.aadhaar_number }}">
                    </div>

                    <div class="form-group">
                        <label>PAN Number</label>
                        <input type="text" name="pan_number" value="{{ profile.pan_number }}">
                    </div>

                    <div class="form-group">
                        <label>UAN Number</label>
                        <input type="text" name="uan_number" value="{{ profile.uan_number }}">
                    </div>

                    <div class="form-group">
                        <label>AAPC Certification</label>
                        <select name="aapc_cert">
                            <option value="No" {% if profile.aapc_cert == "No" %}selected{% endif %}>No</option>
                            <option value="Yes" {% if profile.aapc_cert == "Yes" %}selected{% endif %}>Yes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Credential No</label>
                        <input type="text" name="credential_no" value="{{ profile.credential_no }}">
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>BGV Details</label>
                        <textarea name="bgv_details" rows="3" style="width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px;">{{ profile.bgv_details }}</textarea>
                    </div>
                </div>
            </div>

            <!-- Bank Details -->
            <div class="section bank-section">
                <div class="section-title">Bank & Payroll Details</div>

                <div class="hr-form-body">
                    <div class="form-group">
                        <label>Bank Name</label>
                        <input type="text" name="bank_name" value="{{ bank.bank_name }}">
                    </div>

                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="text" name="account_number" value="{{ bank.account_number }}">
                    </div>

                    <div class="form-group">
                        <label>IFSC Code</label>
                        <input type="text" name="ifsc_code" value="{{ bank.ifsc_code }}">
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <a href="{% url 'user_profile' emp_code=profile.emp_code|urlencode %}" class="btn btn-cancel">
                    Cancel
                </a>
                <button type="submit" class="btn btn-save">
                    Save Changes
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
