{% extends "myapp/base.html" %}
{% block content %}
<div class="container mt-5 text-center">
    <div class="alert alert-success" style="border-radius: 20px; padding: 4rem; background: #f0fdf4; border: 1px solid #dcfce7;">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
        <h2 class="mt-4 fw-bold" style="color: #166534;">Registration Successful!</h2>
        <p class="text-muted mb-4" style="font-size: 1.1rem;">Your details have been submitted to HR for review. You will be notified once your profile is approved.</p>
        <div class="mt-4">
            <a href="{% url 'dashboard' %}" class="btn btn-success" style="border-radius: 12px; padding: 0.8rem 2.5rem; font-weight: 600;">
                <i class="bi bi-house-door"></i> Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
