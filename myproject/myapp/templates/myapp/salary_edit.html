{% extends "myapp/base.html" %}
{% block content %}

<div class="container mt-5" style="max-width:500px">
    <div class="card shadow">
        <div class="card-header bg-warning">
            Edit Gross Salary
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Employee Code</label>
                    <input type="text" class="form-control" value="{{ emp_code }}" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Total Gross</label>
                    <input type="number" step="0.01" name="total_gross"
                           class="form-control" value="{{ gross }}" required>
                </div>

                <div class="alert alert-info small">
                    Basic, HRA, DA, PF & ESI will be auto-calculated based on attendance.
                </div>
            </div>

            <div class="card-footer text-end">
                <button class="btn btn-primary">Save</button>
                <a href="{% url 'salary_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
