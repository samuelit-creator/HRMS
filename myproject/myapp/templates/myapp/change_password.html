{% extends "myapp/base.html" %}
{% block content %}

<style>
    .change-password-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .change-password-card {
        background: #fff;
        width: 100%;
        max-width: 420px;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    }

    .change-password-card h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #222;
        font-weight: 600;
    }

    .form-group {
        position: relative;
        margin-bottom: 18px;
    }

    .form-group input {
        width: 100%;
        padding: 12px 42px 12px 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 14px;
    }

    .form-group input:focus {
        border-color: #2575fc;
        box-shadow: 0 0 5px rgba(37, 117, 252, 0.5);
    }

    .toggle-eye {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #666;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: #2575fc;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-submit:hover {
        background: #6a11cb;
    }

    .message {
        text-align: center;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 6px;
        font-size: 14px;
    }

    .message.error {
        background: #ffe0e0;
        color: #c62828;
    }

    .message.success {
        background: #e0ffe5;
        color: #2e7d32;
    }
</style>

<div class="change-password-wrapper">
    <div class="change-password-card">
        <h2>Change Password</h2>

        {% if error %}
            <div class="message error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="message success">{{ success }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <input type="password" id="current_password" name="current_password" placeholder="Current Password" required>
                <i class="fa fa-eye toggle-eye" onclick="togglePassword('current_password', this)"></i>
            </div>

            <div class="form-group">
                <input type="password" id="new_password" name="new_password" placeholder="New Password" required>
                <i class="fa fa-eye toggle-eye" onclick="togglePassword('new_password', this)"></i>
            </div>

            <div class="form-group">
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                <i class="fa fa-eye toggle-eye" onclick="togglePassword('confirm_password', this)"></i>
            </div>

            <button type="submit" class="btn-submit">Change Password</button>
        </form>
    </div>
</div>

<script>
    function togglePassword(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>

{% endblock %}
