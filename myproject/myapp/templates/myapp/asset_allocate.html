{% extends "myapp/base.html" %}
{% block title %}Allocate Asset{% endblock %}
{% block page_title %}Allocate Asset: {{ asset.AssetTag }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 overflow-hidden">
                <div class="row g-0">
                    <div class="col-md-4 bg-primary text-white p-4 d-flex flex-column justify-content-center text-center">
                        <i class="bi bi-laptop display-1 mb-3"></i>
                        <h4 class="fw-bold mb-1">{{ asset.Name }}</h4>
                        <p class="opacity-75 small">Tag: {{ asset.AssetTag }}</p>
                    </div>
                    <div class="col-md-8">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4">Assign to Employee</h5>
                            
                            <form method="post">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small">Select Employee</label>
                                    <select name="employee" class="form-select" required>
                                        <option value="" disabled selected>Choose an employee...</option>
                                        {% for emp in employees %}
                                        <option value="{{ emp.EmployeeCode }}">{{ emp.EmployeeName }} ({{ emp.EmployeeCode }})</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small">Allocation Date</label>
                                    <input type="date" name="allocated_date" class="form-control" value="{{ today|date:'Y-m-d' }}" required>
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label fw-semibold small">Asset Condition on Assignment</label>
                                    <select name="condition" class="form-select">
                                        <option value="New">New / Excellent</option>
                                        <option value="Good" selected>Good / Used</option>
                                        <option value="Fair">Fair (Minor Scratches)</option>
                                        <option value="Damaged">Damaged / Functional</option>
                                    </select>
                                </div>
                                
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary py-2 fw-bold">Confirm Allocation</button>
                                    <a href="{% url 'asset_list' %}" class="btn btn-light py-2">Go Back</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .card { border-radius: 12px; }
    .bg-primary { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%) !important; }
</style>
{% endblock %}
