<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Reporting</title>
</head>
<body>
    <h1>Employee Reporting Table</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Employee Code</th>
                <th>Reports To Employee Code</th>
                <th>Role</th>
                <th>Created At</th>
                <th>Updated At</th>
            </tr>
        </thead>
        <tbody>
            {% for employee in employees %}
            <tr>
                <td>{{ employee.EmployeeCode }}</td>  <!-- EmployeeCode -->
                <td>{{ employee.ReportsToEmpCode }}</td>  <!-- ReportsToEmpCode -->
                <td>{{ employee.Role }}</td>  <!-- Role -->
                <td>{{ employee.CreatedAt }}</td>  <!-- CreatedAt -->
                <td>{{ employee.UpdatedAt }}</td>  <!-- UpdatedAt -->
            </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
