<li>
    <div class="card">
        <div class="avatar">👤</div>
        <div class="info">
            <div class="name">{{ node.name }}</div>
            <div class="role">{{ node.designation }}</div>
        </div>
    </div>

    {% if node.children %}
    <ul>
        {% for child in node.children %}
            {% include "myapp/node.html" with node=child %}
        {% endfor %}
    </ul>
    {% endif %}
</li>
